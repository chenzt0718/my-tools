<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表格工具</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <div class="toolbar-left">
    <span class="app-title">表格工具</span>
    <span class="separator">|</span>
    <button id="btnOpen" class="tb-btn">📂 打开文件</button>
    <button id="btnSave" class="tb-btn" disabled>💾 保存</button>
    <span class="separator">|</span>
    <button id="btnValidate" class="tb-btn" disabled>✅ 校验</button>
    <button id="btnClearColor" class="tb-btn" disabled>🧹 清除颜色</button>
    <span class="separator">|</span>
    <span class="file-info" id="fileInfo">未打开文件</span>
    <span class="encryption-badge" id="encryptionBadge" style="display:none;" title="加密文件">🔒</span>
  </div>
  <div class="toolbar-right">
    <span class="sheet-tabs" id="sheetTabs"></span>
  </div>
</div>

<!-- Stats Bar -->
<div id="statsBar">
  <span id="statsContent">选择单元格以查看统计信息</span>
</div>

<!-- Main Grid -->
<div id="gridContainer">
  <div id="gridWrapper">
    <canvas id="gridCanvas"></canvas>
    <div id="cellEditor" contenteditable="true" style="display:none;"></div>
  </div>
</div>

<!-- Context Menu -->
<div id="contextMenu" class="context-menu" style="display:none;">
  <div class="menu-item" data-color="#ff6b6b">🔴 红色标记</div>
  <div class="menu-item" data-color="#ffd93d">🟡 黄色标记</div>
  <div class="menu-item" data-color="#6bcb77">🟢 绿色标记</div>
  <div class="menu-item" data-color="#4d96ff">🔵 蓝色标记</div>
  <div class="menu-divider"></div>
  <div class="menu-item" data-color="">✖️ 清除颜色</div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".xlsx,.xls,.et,.enc" style="display:none;">

<!-- Validate Dialog -->
<div id="validateDialog" class="dialog-overlay" style="display:none;">
  <div class="dialog">
    <h3>数据校验规则</h3>
    <div id="validateRules">
      <div class="rule-row">
        <label><input type="checkbox" class="rule-check" data-rule='{"type":"not_empty"}'> 检查空值</label>
      </div>
      <div class="rule-row">
        <label><input type="checkbox" class="rule-check" data-rule='{"type":"is_number"}'> 检查非数值</label>
      </div>
      <div class="rule-row">
        <label><input type="checkbox" class="rule-check" data-rule='{"type":"range","min":0,"max":1000000}'> 数值范围: 0 ~ 1,000,000</label>
      </div>
      <div class="rule-row">
        <label><input type="checkbox" class="rule-check" data-rule='{"type":"regex","pattern":"^1[3-9]\\d{9}$"}'> 手机号格式 (1xx-xxxx-xxxx)</label>
      </div>
    </div>
    <div class="dialog-actions">
      <button id="btnRunValidate" class="tb-btn primary">执行校验</button>
      <button id="btnCloseValidate" class="tb-btn">关闭</button>
    </div>
    <div id="validateResult" style="margin-top:12px; max-height:200px; overflow-y:auto;"></div>
  </div>
</div>

<!-- Status Bar -->
<div id="statusBar">
  <span id="statusText">就绪</span>
  <span id="cellPosition" style="margin-left:auto;">—</span>
</div>

<script src="/static/canvas-grid.js"></script>
<script src="/static/toolbar.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
