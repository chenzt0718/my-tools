<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown 笔记</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface-hover: #222;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-secondary: #888;
    --accent: #3498db;
    --danger: #e74c3c;
    --sidebar-width: 240px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ───────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text-secondary);
    text-transform: uppercase;
  }

  .btn {
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    border-radius: 6px;
    padding: 7px 14px;
    transition: all 0.15s;
    outline: none;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { filter: brightness(1.15); }

  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: #444; }

  .btn-danger {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid transparent;
  }
  .btn-danger:hover { color: var(--danger); border-color: var(--danger); }

  .note-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .note-list::-webkit-scrollbar { width: 4px; }
  .note-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .note-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
    position: relative;
  }
  .note-item:hover { background: var(--surface-hover); }
  .note-item.active { background: rgba(52, 152, 219, 0.12); }

  .note-item .title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .note-item .meta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 3px;
  }
  .note-item .delete-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s;
    padding: 4px;
  }
  .note-item:hover .delete-btn { opacity: 1; }
  .note-item .delete-btn:hover { color: var(--danger); }

  .empty-notes {
    text-align: center;
    color: #555;
    padding: 40px 16px;
    font-size: 13px;
    line-height: 1.8;
  }
  .empty-notes kbd {
    background: var(--surface-hover);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    border: 1px solid var(--border);
    font-family: inherit;
  }

  /* ── Main Area ─────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .editor-preview {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .pane-header {
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .editor-pane {
    border-right: 1px solid var(--border);
  }

  .editor {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.7;
    padding: 20px;
    resize: none;
    outline: none;
    width: 100%;
  }
  .editor::-webkit-scrollbar { width: 6px; }
  .editor::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .preview {
    flex: 1;
    padding: 20px 24px;
    overflow-y: auto;
    line-height: 1.7;
    font-size: 15px;
  }
  .preview::-webkit-scrollbar { width: 6px; }
  .preview::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .preview h1 { font-size: 28px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .preview h2 { font-size: 22px; margin: 24px 0 12px; }
  .preview h3 { font-size: 18px; margin: 20px 0 8px; }
  .preview p { margin-bottom: 12px; }
  .preview code {
    background: var(--surface-hover);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 13px;
  }
  .preview pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin-bottom: 16px;
  }
  .preview pre code { background: none; padding: 0; }
  .preview blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 16px;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }
  .preview ul, .preview ol { margin-bottom: 16px; padding-left: 24px; }
  .preview li { margin-bottom: 4px; }
  .preview a { color: var(--accent); }
  .preview img { max-width: 100%; border-radius: 8px; }
  .preview table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
  .preview th, .preview td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .preview th { background: var(--surface); }

  .preview-empty {
    color: #444;
    text-align: center;
    margin-top: 60px;
    font-size: 14px;
  }

  /* ── Status Bar ────────────────────────────────── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 16px;
    font-size: 11px;
    color: var(--text-secondary);
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .status-bar .status-left { display: flex; gap: 16px; }

  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #2ecc71;
    color: #000;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 20px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--danger); color: #fff; }

  /* ── Responsive ────────────────────────────────── */
  @media (max-width: 768px) {
    .sidebar { width: 180px; min-width: 180px; }
    .editor-preview { flex-direction: column; }
    .editor-pane { border-right: none; border-bottom: 1px solid var(--border); }
    .preview { padding: 16px; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">笔记</span>
    <button class="btn btn-primary" id="newBtn" title="新建笔记 (Ctrl+N)">+ 新建</button>
  </div>
  <div class="note-list" id="noteList">
    <div class="empty-notes">暂无笔记<br>按 <kbd>Ctrl+N</kbd> 新建</div>
  </div>
</div>

<div class="main" id="main">
  <div class="editor-preview">
    <div class="pane editor-pane">
      <div class="pane-header">
        <span>Markdown</span>
        <span id="saveIndicator" style="color:#2ecc71;opacity:0;transition:opacity 0.3s">已保存</span>
      </div>
      <textarea class="editor" id="editor"
        placeholder="# 开始写点什么..."
        spellcheck="false"></textarea>
    </div>
    <div class="pane">
      <div class="pane-header">预览</div>
      <div class="preview" id="preview">
        <div class="preview-empty">在左侧编辑器中输入内容，这里会实时渲染</div>
      </div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-left">
      <span id="statusFile">未选择文件</span>
      <span id="wordCount">0 字</span>
    </div>
    <span id="statusModified"></span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = (sel) => document.querySelector(sel);

const editor = $('#editor');
const preview = $('#preview');
const noteList = $('#noteList');
const newBtn = $('#newBtn');
const saveIndicator = $('#saveIndicator');
const statusFile = $('#statusFile');
const wordCount = $('#wordCount');
const statusModified = $('#statusModified');
const toast = $('#toast');

let currentFile = null;
let currentContent = '';
let saveTimer = null;
let dirty = false;

// ── Toast ──────────────────────────────────────────
function showToast(msg, isError = false) {
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.className = 'toast', 2000);
}

// ── Preview ────────────────────────────────────────
function updatePreview() {
  const md = editor.value;
  if (!md.trim()) {
    preview.innerHTML = '<div class="preview-empty">在左侧编辑器中输入内容，这里会实时渲染</div>';
  } else {
    preview.innerHTML = marked.parse(md);
  }
  wordCount.textContent = md.length + ' 字';
}

editor.addEventListener('input', () => {
  updatePreview();
  dirty = true;
  saveIndicator.style.opacity = '0';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(autoSave, 800);
});

// ── Auto Save ──────────────────────────────────────
async function autoSave() {
  if (!currentFile || !dirty) return;
  const content = editor.value;
  try {
    const resp = await fetch(`/api/notes/${encodeURIComponent(currentFile)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    if (resp.ok) {
      dirty = false;
      currentContent = content;
      saveIndicator.style.opacity = '1';
      loadNoteList();
    }
  } catch (e) {
    showToast('保存失败', true);
  }
}

// ── Note List ──────────────────────────────────────
async function loadNoteList() {
  const resp = await fetch('/api/notes');
  const notes = await resp.json();

  if (notes.length === 0) {
    noteList.innerHTML = '<div class="empty-notes">暂无笔记<br>按 <kbd>Ctrl+N</kbd> 新建</div>';
    return;
  }

  noteList.innerHTML = notes.map(n =>
    `<div class="note-item${n.filename === currentFile ? ' active' : ''}" data-file="${n.filename}">
      <div class="title">${escapeHtml(n.title)}</div>
      <div class="meta">${n.modified}</div>
      <button class="delete-btn" data-file="${n.filename}" title="删除">×</button>
    </div>`
  ).join('');

  // Click to open
  noteList.querySelectorAll('.note-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-btn')) return;
      openNote(el.dataset.file);
    });
  });

  // Delete button
  noteList.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteNote(btn.dataset.file);
    });
  });
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Open Note ──────────────────────────────────────
async function openNote(filename) {
  if (dirty && currentFile) await autoSave();

  const resp = await fetch(`/api/notes/${encodeURIComponent(filename)}`);
  if (!resp.ok) {
    showToast('无法打开笔记', true);
    return;
  }
  const note = await resp.json();
  currentFile = note.filename;
  currentContent = note.content;
  editor.value = note.content;
  dirty = false;
  updatePreview();
  statusFile.textContent = note.filename;
  saveIndicator.style.opacity = '0';
  editor.focus();
  loadNoteList();
}

// ── New Note ───────────────────────────────────────
async function newNote() {
  if (dirty && currentFile) await autoSave();

  const title = prompt('笔记标题:', '新笔记');
  if (!title) return;

  const resp = await fetch('/api/notes', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title }),
  });
  const note = await resp.json();
  currentFile = note.filename;
  currentContent = note.content;
  editor.value = note.content;
  dirty = false;
  updatePreview();
  statusFile.textContent = note.filename;
  saveIndicator.style.opacity = '0';
  loadNoteList();
  editor.focus();
}

// ── Delete Note ────────────────────────────────────
async function deleteNote(filename) {
  if (!confirm(`确定删除 "${filename}" 吗？此操作不可撤销。`)) return;

  const resp = await fetch(`/api/notes/${encodeURIComponent(filename)}`, { method: 'DELETE' });
  if (!resp.ok) {
    showToast('删除失败', true);
    return;
  }

  if (currentFile === filename) {
    currentFile = null;
    currentContent = '';
    editor.value = '';
    dirty = false;
    updatePreview();
    statusFile.textContent = '未选择文件';
    saveIndicator.style.opacity = '0';
  }
  loadNoteList();
  showToast('已删除');
}

// ── Keyboard Shortcuts ─────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    if (currentFile && dirty) {
      clearTimeout(saveTimer);
      autoSave();
      showToast('已保存');
    }
  } else if (e.ctrlKey && e.key === 'n') {
    e.preventDefault();
    newNote();
  }
});

// ── Events ─────────────────────────────────────────
newBtn.addEventListener('click', newNote);

// ── Init ──────────────────────────────────────────
loadNoteList();
</script>
</body>
</html>
